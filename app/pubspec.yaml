name: athens
description: "Athens — pairwise music rating app. Open-source, single hosted instance."
publish_to: 'none'
version: 1.4.0+10402

environment:
  sdk: ^3.6.0
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.3

  # Backend
  supabase_flutter: ^2.8.4

  # Local cache (offline-first)
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5

  # Secure storage (app preferences, e.g. language)
  flutter_secure_storage: ^9.2.4

  # Charts
  fl_chart: ^0.70.2

  # Share / export
  screenshot: ^3.0.0
  share_plus: ^10.1.4

  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  intl: ^0.20.2
  http: ^1.2.2
  url_launcher: ^6.3.1

  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  package_info_plus: ^9.0.1

  # In-app purchases (Google Play Billing — Store build only)
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.22.1
  freezed: ^2.5.7
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.1
  flutter_launcher_icons: ^0.14.1

# App icon (the orange bull). Regenerate platform icons with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/logo_1024.png"
  android: true
  adaptive_icon_background: "#F93902"
  adaptive_icon_foreground: "assets/icon/logo_foreground.png"
  ios: true
  remove_alpha_ios: true
  web:
    generated: true
    image_path: "assets/icon/logo_1024.png"
    background_color: "#F93902"
    theme_color: "#F93902"
  macos:
    generated: true
    image_path: "assets/icon/logo_1024.png"

flutter:
  uses-material-design: true

  fonts:
    - family: Hanken Grotesk
      fonts:
        - asset: assets/fonts/HankenGrotesk.ttf
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard.ttf
