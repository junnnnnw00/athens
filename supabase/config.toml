# Supabase local dev config.
# Run `supabase start` with Docker to get a local instance.
# Reference: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
# Hosted Site URL drives the email-confirmation link. Set the SAME value in the
# dashboard (Auth → URL Configuration → Site URL) — this local file does not
# change the hosted project. localhost is only for `supabase start` locally.
site_url = "https://athens.vercel.app"
additional_redirect_urls = ["https://athens.vercel.app/**", "athens://**", "http://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
# Require email verification before a new account is usable (PRELAUNCH #2).
# NOTE: this local config does NOT change the HOSTED project — flip the same
# setting in the Supabase dashboard (Auth → Providers → Email → "Confirm email")
# AND set mailer_autoconfirm = false there. The default Supabase SMTP only sends
# to team members + rate-limits hard, so configure a custom SMTP provider first
# (Brevo 300/day or Resend 100/day free). See PRELAUNCH.md.
enable_confirmations = true

[auth.sms]
enable_signup = false
enable_confirmations = false
